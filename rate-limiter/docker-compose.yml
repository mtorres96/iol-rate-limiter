# Compose v2 (no obsolete top-level `version:` key).
# `docker compose up` builds the app image, starts Redis with a healthcheck, waits
# for it to report healthy, then runs the demo against the real distributed Redis path.

services:
  redis:
    image: redis:7.4-alpine
    # No host port mapping: Redis is reachable only on the internal compose network.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    init: true # PID-1 signal forwarding so SIGTERM triggers graceful shutdown.
    environment:
      REDIS_URL: redis://redis:6379 # Real distributed path under compose (D4-01).
      PORT: "3000"
      RL_ALGO: "${RL_ALGO:-token-bucket}" # Default algorithm; shell-overridable, default token-bucket.
      RL_LIMIT: "${RL_LIMIT:-5}" # Tunable: allowed budget (capacity / limit); shell-overridable, default 5.
      RL_WINDOW_MS: "${RL_WINDOW_MS:-60000}" # Tunable: interval / window in ms; shell-overridable, default 60000.
      RL_REFILL: "${RL_REFILL:-5}" # Tunable: token-bucket refill per interval; shell-overridable, default 5.
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy # Wait for Redis PONG, not just container start (D4-05).

  # Demo-tier observability (OBS-02). Prometheus scrapes the app's /metrics endpoint
  # at `app:3000` over this same compose network every ~5s (config in monitoring/).
  # Pinned image tag for reproducibility, like redis:7.4-alpine above.
  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  # Grafana renders the pre-provisioned "Allowed vs Blocked" dashboard.
  # HOST port is 3001 → container 3000, because the app already owns host port 3000.
  # Anonymous Viewer access so the dashboard opens with NO login (demo convenience).
  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
